<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preview Museo · Goya — Dalí</title>
<style>
  * { box-sizing: border-box; }

  :root{
    --bg-1:#0b0907;
    --bg-2:#18120d;
    --gold-1:#9a7447;
    --gold-2:#c49a63;
    --gold-3:#6d4f2d;
    --paper:#f2e8d8;
    --paper-soft:#dcc8a8;
    --shadow:rgba(0,0,0,.62);
  }

  html, body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at 18% 18%, rgba(190,140,75,.14), transparent 24%),
      radial-gradient(circle at 82% 22%, rgba(255,245,220,.05), transparent 18%),
      linear-gradient(90deg, rgba(255,180,70,.04) 0%, transparent 18%, transparent 82%, rgba(255,180,70,.03) 100%),
      linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, #050403 100%);
    color: var(--paper);
    font-family: Georgia, "Times New Roman", serif;
    overflow: hidden;
  }

  .grain{
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: .06;
    background-image:
      linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 4px 4px, 5px 5px;
    mix-blend-mode: soft-light;
  }

  .spotlight{
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 72% 37%, rgba(255,225,175,.19), transparent 18%),
      radial-gradient(circle at 72% 37%, rgba(255,225,175,.09), transparent 32%);
    filter: blur(12px);
  }

  .stage {
    min-height: 100vh;
    display: grid;
    grid-template-columns: .78fr 1.22fr;
    gap: 3rem;
    align-items: center;
    padding: 3.4rem 4.8vw;
  }

  .copy {
    max-width: 720px;
    position: relative;
    z-index: 2;
    padding-left: .4rem;
  }

  .eyebrow {
    margin: 0 0 1rem 0;
    font-size: .95rem;
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--paper-soft);
    opacity: .92;
  }

  .line {
    margin: 0;
    opacity: 0;
    transform: translateY(22px);
    transition: opacity .9s ease, transform .9s ease, filter .9s ease;
    filter: blur(8px);
    text-shadow: 0 4px 18px rgba(0,0,0,.42);
  }

  .line.visible {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }

  .line-1 {
    font-size: clamp(2.6rem, 5vw, 5.1rem);
    line-height: .98;
  }

  .line-2 {
    margin-top: .4rem;
    font-size: clamp(1.7rem, 2.4vw, 2.55rem);
    color: #f0e3cf;
  }

  .line-3 {
    margin-top: 1.6rem;
    font-size: clamp(4.3rem, 7vw, 7.6rem);
    line-height: .92;
    letter-spacing: .14em;
    font-weight: 700;
  }

  .line-4 {
    margin-top: .9rem;
    font-size: clamp(1.45rem, 2.1vw, 2.15rem);
    font-style: italic;
    color: #e5d7c1;
  }

  .enter {
    margin-top: 2.25rem;
    display: inline-flex;
    align-items: center;
    gap: .9rem;
    padding: 1rem 1.45rem;
    border: 1px solid rgba(242,232,216,.62);
    background: rgba(255,255,255,.03);
    color: var(--paper);
    font-size: clamp(.98rem, 1.15vw, 1.08rem);
    letter-spacing: .14em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .85s ease, transform .85s ease, background .28s ease, border-color .28s ease;
    backdrop-filter: blur(4px);
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(0,0,0,.18);
  }

  .enter.visible {
    opacity: 1;
    transform: translateY(0);
    animation: pulse 2s ease-in-out infinite;
  }

  .enter:hover {
    background: rgba(255,255,255,.11);
    border-color: #fff;
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(242,232,216,.18); }
    70%  { box-shadow: 0 0 0 18px rgba(242,232,216,0); }
    100% { box-shadow: 0 0 0 0 rgba(242,232,216,0); }
  }

  .art {
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 2;
  }

  .frame {
    position: relative;
    width: min(100%, 860px);
    padding: 22px;
    background: linear-gradient(135deg, var(--gold-3) 0%, var(--gold-2) 52%, #5e4425 100%);
    border-radius: 7px;
    box-shadow:
      0 50px 110px rgba(0,0,0,.7),
      inset 0 0 0 1px rgba(255,245,220,.10);
  }

  .frame::before {
    content: "";
    position: absolute;
    inset: 11px;
    border: 1px solid rgba(255,238,214,.28);
    pointer-events: none;
  }

  .frame::after {
    content: "";
    position: absolute;
    top: -80px;
    left: -40px;
    width: 560px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,227,180,.16), transparent 72%);
    filter: blur(32px);
    pointer-events: none;
  }

  .painting-wrap {
    position: relative;
    overflow: hidden;
    aspect-ratio: 4 / 5;
    background: #111;
  }

  .painting {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(.04) contrast(1.04) brightness(.95);
    transform: scale(1.01);
    animation: drift 18s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: scale(1.01) translateX(0) translateY(0); }
    100% { transform: scale(1.045) translateX(-8px) translateY(-5px); }
  }

  .painting-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.04), rgba(0,0,0,.2)),
      radial-gradient(circle at 42% 34%, rgba(255,255,255,.13), transparent 22%);
    pointer-events: none;
  }

  .painting-caption {
    position: absolute;
    left: 1.25rem;
    bottom: 1.25rem;
    padding: .45rem .7rem;
    background: rgba(12,10,8,.42);
    border: 1px solid rgba(255,255,255,.12);
    color: #f4ead8;
    font-size: .85rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    backdrop-filter: blur(5px);
  }

  .credit {
    margin-top: .75rem;
    font-size: .82rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: rgba(245,239,227,.76);
    text-align: center;
  }

  .player {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 10;
    display: flex;
    gap: .6rem;
    align-items: center;
    padding: .85rem 1rem;
    border-radius: 999px;
    background: rgba(12, 10, 8, .78);
    border: 1px solid rgba(255,255,255,.12);
    color: #f5efe3;
    backdrop-filter: blur(8px);
    font-size: .92rem;
    box-shadow: 0 12px 28px rgba(0,0,0,.24);
  }

  .player button {
    border: 1px solid rgba(245,239,227,.45);
    background: transparent;
    color: inherit;
    border-radius: 999px;
    padding: .5rem .85rem;
    cursor: pointer;
  }

  .player button:hover { background: rgba(255,255,255,.08); }

  @media (max-width: 1180px) {
    .stage {
      grid-template-columns: .95fr 1.05fr;
      gap: 2.2rem;
      padding: 2.8rem 3vw;
    }

    .line-3 {
      font-size: clamp(3.5rem, 6.2vw, 6rem);
    }

    .frame {
      width: min(100%, 720px);
    }
  }

  @media (max-width: 900px) {
    html, body { overflow: auto; }

    .stage {
      grid-template-columns: 1fr;
      gap: 2rem;
      padding: 1.4rem 1.15rem 5rem;
    }

    .copy {
      text-align: center;
      max-width: none;
      order: 2;
    }

    .art {
      order: 1;
    }

    .frame {
      width: min(100%, 640px);
    }

    .enter {
      width: 100%;
      justify-content: center;
    }

    .player {
      right: 10px;
      left: 10px;
      bottom: 10px;
      justify-content: center;
      flex-wrap: wrap;
      border-radius: 16px;
    }
  }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="spotlight"></div>

  <main class="stage">
    <section class="copy">
      <p class="eyebrow">Preview exposición</p>
      <p id="l1" class="line line-1">Bienvenidos...</p>
      <p id="l2" class="line line-2">a la exposición.</p>
      <p id="l3" class="line line-3">GOYA —<br>DALÍ</p>
      <p id="l4" class="line line-4">Del Capricho... al Disparate.</p>
      <button id="enterBtn" class="enter" type="button">Pulse para acceder</button>
    </section>

    <section class="art">
      <div class="frame">
        <div class="painting-wrap">
          <img src="assets/dali.png" alt="Dalí" class="painting" />
          <div class="painting-overlay"></div>
          <div class="painting-caption">Sala inmersiva · vista previa</div>
        </div>
        <div class="credit">Concepto museográfico con obra protagonista y audio guiado</div>
      </div>
    </section>
  </main>

  <div class="player">
    <span>Audio</span>
    <button id="playBtn" type="button">Reproducir</button>
    <button id="restartBtn" type="button">Reiniciar</button>
  </div>

  <audio id="introAudio" preload="auto">
    <source src="assets/intro.mp3" type="audio/mpeg" />
  </audio>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const l1 = document.getElementById("l1");
  const l2 = document.getElementById("l2");
  const l3 = document.getElementById("l3");
  const l4 = document.getElementById("l4");
  const enterBtn = document.getElementById("enterBtn");
  const introAudio = document.getElementById("introAudio");
  const playBtn = document.getElementById("playBtn");
  const restartBtn = document.getElementById("restartBtn");

  const show = (el, delay) => setTimeout(() => el && el.classList.add("visible"), delay);

  function runSequence() {
    [l1, l2, l3, l4, enterBtn].forEach(el => el && el.classList.remove("visible"));
    show(l1, 300);
    show(l2, 1700);
    show(l3, 3100);
    show(l4, 4500);
    show(enterBtn, 6100);
  }

  async function playAudio(fromStart = false) {
    if (!introAudio) return;
    try {
      if (fromStart) introAudio.currentTime = 0;
      await introAudio.play();
    } catch (error) {
      console.warn("Reproducción bloqueada:", error);
    }
  }

  runSequence();

  playBtn.addEventListener("click", () => playAudio(true));
  restartBtn.addEventListener("click", () => {
    runSequence();
    playAudio(true);
  });

  enterBtn.addEventListener("click", () => {
    playAudio(true);
    alert("Aquí enlazarías la entrada real de la exposición.");
  });
});
</script>
</body>
</html>
